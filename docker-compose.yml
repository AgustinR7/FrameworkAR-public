version: '3.8'

services:
  # SERVICIO: Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: framework_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # SERVICIO: Backend Node.js
  backend:
    build: ./backend
    container_name: framework_backend
    command: sh -c "npm install && npm run dev"
    restart: always
    ports:
      - "${BACK_PORT}:${BACK_PORT}"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    env_file:
      - ./backend/.env 
  
  # SERVICIO: Frontend React
  frontend:
    build: ./frontend
    container_name: framework_frontend
    restart: always
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "${FRONT_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data: